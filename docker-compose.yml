version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-orchestrator-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ai_orchestrator}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-orchestrator-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-orchestrator-backend
    restart: unless-stopped
    network_mode: host
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-3000}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@localhost:5432/${DB_NAME:-ai_orchestrator}
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GATEWAY_URL: ws://localhost:18789
      GATEWAY_TOKEN: ${GATEWAY_TOKEN}
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-orchestrator-frontend
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    network_mode: host
    environment:
      VITE_API_URL: http://185.135.137.192/api
      VITE_WS_URL: http://185.135.137.192
      PORT: 8081
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    network_mode: host
    volumes:
      - ./ssl/nginx-host.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
